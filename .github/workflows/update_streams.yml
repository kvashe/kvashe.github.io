name: Update Streams Database

on:
  schedule:
    - cron: '0 10 * * *'   # примерно 13:00 по Москве
  workflow_dispatch:          # возможность запуска вручную

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yt-dlp requests

      - name: Run parser
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python parser.py

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html tracklists.html player.html sitemap.xml parsed_streams_db.json
          git diff --staged --quiet || git commit -m "Auto-update streams database"
          git push
